syntax = "proto3";

package yahoo.finance;

// Real-time ticker data from Yahoo Finance WebSocket stream
// Based on reverse engineering from yliveticker Python library
message yaticker {
    // QuoteType enum defines the type of financial instrument
    enum QuoteType {
        NONE = 0;
        ALTSYMBOL = 5;
        HEARTBEAT = 7;
        EQUITY = 8;
        INDEX = 9;
        MUTUALFUND = 11;
        MONEYMARKET = 12;
        OPTION = 13;
        CURRENCY = 14;
        WARRANT = 15;
        BOND = 17;
        FUTURE = 18;
        ETF = 20;
        COMMODITY = 23;
        ECNQUOTE = 28;
        CRYPTOCURRENCY = 41;
        INDICATOR = 42;
        INDUSTRY = 1000;
    }

    // OptionType enum for options
    enum OptionType {
        CALL = 0;
        PUT = 1;
    }

    // MarketHoursType indicates pre/regular/post market trading
    enum MarketHoursType {
        PRE_MARKET = 0;
        REGULAR_MARKET = 1;
        POST_MARKET = 2;
        EXTENDED_HOURS_MARKET = 3;
    }

    // Core fields (available for all quote types)
    string id = 1;                      // Symbol/ticker
    float price = 2;                    // Current price
    sint64 time = 3;                    // Unix timestamp
    string currency = 4;                // Currency code (USD, EUR, etc.)
    string exchange = 5;                // Exchange code (NYSE, NASDAQ, etc.)
    QuoteType quote_type = 6;           // Type of instrument
    MarketHoursType market_hours = 7;   // Market hours state
    float change_percent = 8;           // Percentage change
    sint64 day_volume = 9;              // Trading volume for the day
    float day_high = 10;                // Day's high price
    float day_low = 11;                 // Day's low price
    float change = 12;                  // Absolute price change
    string short_name = 13;             // Short display name

    // Option-specific fields
    sint64 expire_date = 14;            // Option expiration date (Unix timestamp)
    float open_price = 15;              // Opening price
    float previous_close = 16;          // Previous closing price
    float strike_price = 17;            // Strike price (options)
    string underlying_symbol = 18;      // Underlying symbol (options)
    sint64 open_interest = 19;          // Open interest (options)
    OptionType options_type = 20;       // Call or Put
    sint64 mini_option = 21;            // Mini option flag

    // Bid/Ask spread
    sint64 last_size = 22;              // Size of last trade
    float bid = 23;                     // Current bid price
    sint64 bid_size = 24;               // Current bid size
    float ask = 25;                     // Current ask price
    sint64 ask_size = 26;               // Current ask size
    sint64 price_hint = 27;             // Price decimal hint

    // Cryptocurrency fields
    sint64 vol_24hr = 28;               // 24-hour volume (crypto)
    sint64 vol_all_currencies = 29;     // Volume in all currencies (crypto)
    string from_currency = 30;          // From currency (crypto)
    string last_market = 31;            // Last market (crypto)
    double circulating_supply = 32;     // Circulating supply (crypto)
    double marketcap = 33;              // Market capitalization (crypto)
}
